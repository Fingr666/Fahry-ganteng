<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Ajakan ML</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat {
      width: 320px;
      background: rgba(255,255,255,0.08);
      padding: 20px;
      border-radius: 15px;
      color: white;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    .bubble {
      padding: 10px 12px;
      margin: 8px 0;
      border-radius: 12px;
      width: fit-content;
      max-width: 90%;
      font-size: 14px;
    }

    .me {
      background: #00e5ff;
      color: black;
      margin-left: auto;
      text-align: right;
    }

    .you {
      background: rgba(255,255,255,0.15);
    }

    .center {
      text-align: center;
      font-weight: bold;
      margin: 10px 0;
      color: #ffcc00;
    }
  </style>
</head>
<body>

  <div class="chat">

    <div class="bubble me">Haii adekk bandell</div>

    <div class="bubble me">
      Sesuai janji kemarenn, kamu tak ajak maen ml
    </div>

    <div class="center">Jawab</div>

    <div class="bubble you">"Mau mass"</div>
    <div class="bubble you">'Nggeh mass'</div>

    <div class="bubble me">Okeeyy login 🔥</div>

  </div>

</body>
</html>
